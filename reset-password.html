<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/styles.css">


</head>

<body>

<div class="auth-wrapper">
    <div class="card auth-card p-4" style="width: 380px;">
        <h4 class="text-center mb-3">Reset Password</h4>

    <form onsubmit="return resetSubmit(event)">

        <div class="mb-3 position-relative">
            <label class="form-label">New Password</label>
            <input type="password" id="newPassword" class="form-control">

            <i class="bi bi-eye position-absolute"
               id="eye3"
               style="right: 12px; top: 38px; cursor: pointer;"
               onclick="togglePassword('newPassword','eye3')"></i>
        </div>

        <div class="mb-3 position-relative">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control">

            <i class="bi bi-eye position-absolute"
               id="eye4"
               style="right: 12px; top: 38px; cursor: pointer;"
               onclick="togglePassword('confirmPassword','eye4')"></i>
        </div>

        <button class="btn btn-primary w-100">
            Update Password
        </button>

        <p class="text-center mt-3">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>

    </form>
</div>


</div>

<script src="js/script.js"></script>

</body>
</html>
