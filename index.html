<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Auth System</title>


<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/styles.css">


</head>

<body>

<div class="auth-wrapper">
    <div class="card auth-card p-4" style="width: 350px;">
        <h4 class="text-center mb-3">Welcome Back</h4>


   <form onsubmit="return loginSubmit(event)">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3 position-relative">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">

            <i class="bi bi-eye position-absolute"
               style="right: 12px; top: 38px; cursor: pointer;"
               onclick="togglePassword('loginPassword','eye1')"
               id="eye1"></i>
        </div>

        <button id="loginBtn" type="submit" class="btn btn-primary w-100">Login</button>

        <div class="d-flex justify-content-between mt-3">
            <a href="forgot-password.html" class="auth-link">Forgot?</a>
            <a href="register.html" class="auth-link">Register</a>
        </div>
    </form>

    <hr>

    <button onclick="toggleDarkMode()" class="btn btn-outline-secondary btn-sm w-100">
         Dark Mode
    </button>

</div>


</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->

<script src="js/script.js"></script>

</body>
</html>
