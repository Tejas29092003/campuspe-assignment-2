<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Auth System</title>


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/styles.css">


</head>

<body>

<div class="auth-wrapper">
    <div class="card auth-card p-4" style="width: 380px;">
        <h4 class="text-center mb-3">Create Account</h4>


    <form onsubmit="return validateRegister(event)">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter full name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-1 position-relative">
            <label class="form-label">Password</label>
            <input type="password" id="password" onkeyup="checkStrength()" class="form-control">

            <i class="bi bi-eye position-absolute"
               id="eye2"
               style="right: 12px; top: 38px; cursor: pointer;"
               onclick="togglePassword('password','eye2')"></i>
        </div>

        <small id="strengthText" class="text-muted mb-3 d-block">Password strength</small>

        <button type="submit" class="btn btn-primary w-100">
            Register
        </button>

        <p class="text-center mt-3">
            Already have account?
            <a href="index.html" class="auth-link">Login</a>
        </p>

    </form>
</div>


</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->

<script src="js/script.js"></script>

</body>
</html>
